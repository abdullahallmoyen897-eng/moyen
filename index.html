<!DOCTYPE html>
<html>
<head>
    <title>লোকেশন শেয়ার</title>
</head>
<body>

    <h1>আপনার লোকেশন শেয়ার করুন</h1>
    <button onclick="getLocation()">লোকেশন শেয়ার করুন</button>

    <p id="demo"></p>

    <script>
    var x = document.getElementById("demo");

    function getLocation() {
        if (navigator.geolocation) {
            //getCurrentPosition তিনটি প্যারামিটার নিতে পারে: সফল হলে, ব্যর্থ হলে এবং অপশনস।
            navigator.geolocation.getCurrentPosition(showPosition, showError);
        } else { 
            x.innerHTML = "আপনার ব্রাউজার জিওলোকেশন সাপোর্ট করে না।";
        }
    }

    function showPosition(position) {
        x.innerHTML = "অক্ষাংশ: " + position.coords.latitude + 
        "<br>দ্রাঘিমাংশ: " + position.coords.longitude;
    }

    function showError(error) {
        switch(error.code) {
            case error.PERMISSION_DENIED:
                x.innerHTML = "ব্যবহারকারী লোকেশন রিকোয়েস্ট প্রত্যাখ্যান করেছেন।";
                break;
            case error.POSITION_UNAVAILABLE:
                x.innerHTML = "লোকেশন তথ্য পাওয়া যাচ্ছে না।";
                break;
            case error.TIMEOUT:
                x.innerHTML = "লোকেশন পাওয়ার রিকোয়েস্ট টাইমআউট হয়েছে।";
                break;
            case error.UNKNOWN_ERROR:
                x.innerHTML = "একটি অজানা ত্রুটি ঘটেছে।";
                break;
        }
    }
    </script>

</body>
</html>
